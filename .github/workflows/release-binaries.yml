name: Release binaries

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  upload-binaries:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-apple-darwin
            os: macos-13
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # github.ref is refs/tags/vX.Y.Z on the release event, so this checks out
      # the tagged source and uploads to that release. The tag is supplied by the
      # release-plz-published release, not by any manual input.
      - name: Build and upload ${{ matrix.target }}
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: bioassert
          target: ${{ matrix.target }}
          archive: $bin-$target
          include: README.md
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}
