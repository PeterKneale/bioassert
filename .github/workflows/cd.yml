name: CD - Publish to crates.io

on:
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Verify release tag matches Cargo.toml version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          CARGO_VER=$(grep -m1 '^version' Cargo.toml | cut -d '"' -f2)
          echo "Release tag: $TAG"
          echo "Cargo.toml:  $CARGO_VER"
          if [ "$TAG" != "$CARGO_VER" ]; then
            echo "::error::Release tag '$TAG' does not match Cargo.toml version '$CARGO_VER'. Bump Cargo.toml before releasing."
            exit 1
          fi

      - name: Run tests before publishing
        run: cargo test --all-targets --all-features -- --test-threads=1

      - name: Cargo publish dry run
        run: cargo publish --locked --dry-run

      - name: Publish to crates.io
        run: cargo publish --locked --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
